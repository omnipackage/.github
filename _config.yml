# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: OmniPackage
tagline: Linux packaging made easy
description: >-
  OmniPackage is an open source tool for building and distributing your own
  native Linux packages. Build for many distros using native package
  managers, sign with GPG, and host your own repository on any S3-compatible
  storage or your local filesystem. Runs in CI, on your laptop, or anywhere else.
url: "https://omnipackage.org"
docs_url: "https://docs.omnipackage.org"
github_org_url: "https://github.com/omnipackage"
github_repo_url: "https://github.com/omnipackage/omnipackage-rs"
github_repo: "omnipackage/omnipackage-rs"
producthunt_url: "#"
getting_started_url: "https://docs.omnipackage.org/getting_started/"
install_stable_url: "https://repositories.omnipackage.org/omnipackage-rs/stable/install.html"
install_master_url: "https://repositories.omnipackage.org/omnipackage-rs/master/install.html"
repo_badge_stable_url: "https://repositories.omnipackage.org/omnipackage-rs/stable/badge.svg"
repo_badge_master_url: "https://repositories.omnipackage.org/omnipackage-rs/master/badge.svg"
license: "GPL-3.0"
locale: en_US
author: Oleg Antonyan

# Build settings
#theme: minima
plugins:
  - jekyll-sitemap

exclude:
  - Makefile
  - Gemfile
  - Gemfile.lock
  - vendor
  # profile/README.md is rendered by GitHub on the org profile page.
  # Keep Jekyll out of it so the two don't interfere.
  - profile

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
